name: Sanchit
description: Office Asset Management Application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  sqflite: ^2.3.3
  path: ^1.9.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  intl: ^0.19.0
  uuid: ^4.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/sanchit_logo.png

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/sanchit_logo.png"
  min_sdk_android: 21